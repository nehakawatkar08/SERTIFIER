<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sertifier - Attendance</title>
</head>
<body>
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <!-- Title -->

                    <div class="text-center mb-4">

                        <h2 class="fw-bold">
                            Seminar Attendance
                        </h2>

                        <p class="text-muted mb-1">
                            {{ seminar.title }}
                        </p>

                        <small class="text-secondary">
                            {{ seminar.date_time }}
                        </small>

                    </div>

                    <!-- Messages -->

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-{{ message.tags }}">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <!-- Form -->

                    <form method="POST">

                        {% csrf_token %}

                        <!-- Email -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Attendee Email

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control form-control-lg"
                                placeholder="Enter your registered email"
                                required
                            >

                        </div>

                        <!-- Attendance Code -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Attendance Code

                            </label>

                            <input
                                type="text"
                                name="code"
                                class="form-control form-control-lg text-uppercase"
                                placeholder="Enter attendance code"
                                required
                            >

                        </div>

                        <!-- Submit -->

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg rounded-3"
                            >
                                Mark Attendance
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
</body>
</html>
